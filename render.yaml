services:
  - type: web
    name: youtube-transcript-api
    runtime: python
    branch: feature/vercel-transcript-api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.transcript:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
